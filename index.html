<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primera Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Bienvenido a mi página web</h1>
    <p>Hecha desde cero 🚀</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
</nav>

<div class="container">
    <h2>Inicio</h2>
    <p>Esta es una página web básica. Puedes modificar el contenido a tu gusto.</p>

    <h2>Sobre mí</h2>
    <p>Aquí puedes escribir información sobre ti.</p>

    <h2>Contacto</h2>
    <p>Email: ejemplo@email.com</p>
</div>

<footer>
    <p>© 2026 Mi Página Web</p>
</footer>

</body>
</html>
